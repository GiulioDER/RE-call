[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "recall"
version = "0.1.0"
description = "Retrieval-Augmented Self-Recall for long-running agents (pgvector)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "psycopg[binary]>=3.1",
    "pgvector>=0.3",
]

[project.optional-dependencies]
fastembed = ["fastembed>=0.3"]
mcp = ["mcp>=1.7"]
voyage = ["voyageai>=0.2"]
rerank = ["sentence-transformers>=3.0"]
eval = ["matplotlib>=3.7"]
finetune = ["sentence-transformers>=3.0", "datasets>=2.0", "accelerate>=1.1"]
dev = ["pytest>=8", "ruff>=0.5", "mcp>=1.7"]

[project.scripts]
recall = "recall.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["recall", "recall_mcp"]

[tool.ruff]
line-length = 100
target-version = "py311"
