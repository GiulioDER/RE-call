[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "recall"
version = "0.4.0"
description = "Retrieval-Augmented Self-Recall for long-running agents (pgvector)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "psycopg[binary]>=3.1",
    "pgvector>=0.3",
]

[project.optional-dependencies]
fastembed = ["fastembed>=0.3"]
# Connection pooling — required only for PgVectorStore(pool_size=...), i.e. any server
# process. A CLI runs single-connection and should not pay for a pool maintenance thread.
pool = ["psycopg-pool>=3.2"]
mcp = ["mcp>=1.7", "psycopg-pool>=3.2"]
voyage = ["voyageai>=0.2"]
# NB: rerank / entail / finetune pin the same sentence-transformers floor — bump all three together.
rerank = ["sentence-transformers>=3.0"]
entail = ["sentence-transformers>=3.0"]
eval = ["matplotlib>=3.7"]
finetune = ["sentence-transformers>=3.0", "datasets>=2.0", "accelerate>=1.1", "numpy"]
# pytest-timeout: a chunker that fails to terminate would otherwise HANG the run instead of
# failing it — a hung CI job reads as "still running", not as a regression.
dev = ["pytest>=8", "pytest-timeout>=2.3", "ruff>=0.5", "mcp>=1.7", "psycopg-pool>=3.2"]

[project.scripts]
recall = "recall.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["recall", "recall_mcp"]

[tool.ruff]
line-length = 100
target-version = "py311"
